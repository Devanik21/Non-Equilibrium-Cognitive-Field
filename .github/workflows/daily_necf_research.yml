          def topic_3_lyapunov(seed):
              """Full Lyapunov spectrum via QR method on Kuramoto tangent space."""
              rng = np.random.default_rng(seed)
              N = 16;  K = float(0.70 + rng.uniform(-0.1, 0.2))
              dt = 0.01;  T_warm = 500;  T_accum = 800
              omega = rng.normal(1.0, 0.3, N)
              theta = rng.uniform(0, 2*np.pi, N)

              # Warmup
              for _ in range(T_warm):
                  d = theta[np.newaxis,:] - theta[:,np.newaxis]
                  theta = (theta + (omega + K*np.sin(d).sum(1)/N)*dt) % (2*np.pi)

              Q = np.eye(N);  lyap = np.zeros(N)
              for _ in range(T_accum):
                  d = theta[np.newaxis,:] - theta[:,np.newaxis]
                  theta = (theta + (omega + K*np.sin(d).sum(1)/N)*dt) % (2*np.pi)
                  c = np.cos(d)
                  J = (K/N)*c
                  J[np.arange(N), np.arange(N)] = -(K/N)*(c.sum(1) - 1.0)
                  Q, R = np.linalg.qr(Q + dt*(J@Q))
                  lyap += np.log(np.abs(np.diag(R)) + 1e-15)

              lambdas = sorted((lyap / (T_accum*dt)).tolist(), reverse=True)
              lam_max = lambdas[0]
              lam_sum = sum(lambdas)

              # Kaplan-Yorke dimension
              j = len(lambdas);  cs = 0.0
              for i, l in enumerate(lambdas):
                  if cs + l < 0: j = i; break
                  cs += l
              DKY = j + cs/abs(lambdas[j]) if j < len(lambdas) else float(j)

              # Consistency: trace(J) should equal sum of Lyapunov exponents
              d_final = theta[np.newaxis,:] - theta[:,np.newaxis]
              c_final = np.cos(d_final)
              J_final = (K/N)*c_final
              J_final[np.arange(N),np.arange(N)] = -(K/N)*(c_final.sum(1)-1.0)
              trace_J = float(J_final.trace())
              lyap_sum_check = lam_sum

              key = {
                  "N": N, "K": K, "T_warm": T_warm, "T_accum": T_accum,
                  "lambdas": [round(l,5) for l in lambdas],
                  "lam_max": lam_max, "D_KY": DKY, "lam_sum": lam_sum,
                  "trace_J": trace_J,
              }
