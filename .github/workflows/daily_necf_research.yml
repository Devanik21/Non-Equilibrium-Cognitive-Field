              # Error profile: low-error group (first N//2) vs high-error group
              eps_low  = float(0.03 + rng.uniform(0,0.04))
              eps_high = float(0.20 + rng.uniform(0,0.10))
              eps      = np.concatenate([np.full(N//2, eps_low),
                                         np.full(N//2, eps_high)])
              kappas   = [0.02, 0.05, 0.10, 0.30, 1.00, 2.50]
              taus_emp = [];  taus_th = []

              for kappa in kappas:
                  L = np.ones((N,3))*0.3
                  L[N//2:,1] = 1.50   # high coupling for high-error group
                  gap_hist   = []
                  lw = -eps/kappa; lw -= lw.max(); w = np.exp(lw); w /= w.sum()
                  Ww = W * w[np.newaxis,:]
                  cross_w = float(w[:N//2].sum())
                  tau_th  = 1.0 / (mu * eps_high * cross_w * dt + 1e-10)
                  taus_th.append(tau_th)

                  for _ in range(T):
                      Lt = (Ww @ L) / (Ww.sum(1,keepdims=True)+1e-10)
                      L  = L + mu*(Lt-L)*eps[:,np.newaxis]*dt
