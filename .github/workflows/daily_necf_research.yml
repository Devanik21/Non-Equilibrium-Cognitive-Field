          ## 2. Experimental Setup

          - $N = {N}$, $K = {K}$, $T = {T}$ settling steps, {N_trials} trials
          - **Basin detection:** final mean phases $\\psi$ clustered by circular
            distance $|\\psi_i - \\psi_j| < 0.4$ rad
          - **Escape test:** 50-step Lorenz kick with amplitude 0.10,
            escape declared if $r_{{\\rm after}} < 0.5\\,r_{{\\rm before}}$

          ---

          ## 3. Results

          | Metric | Value |
          |---|---|
          | Distinct attractor basins detected | **{n_basins}** |
          | Basin sizes (trials per basin) | {basin_sizes} |
          | Mean final $r$ across all trials | {r_arr.mean():.5f} ± {r_arr.std():.5f} |
          | Lorenz-perturbation escape rate $k_{{\\rm esc}}$ | **{k_esc:.4f}** ({n_escape}/{N_trials} trials) |
          | Landscape character | {'multi-basin (complex topology)' if n_basins > 3 else 'few-basin (simple topology)' if n_basins > 1 else 'single-basin (funnel landscape)'} |

          ---

          ## 4. Interpretation

          The free energy landscape at $K = {K}$, $N = {N}$ exhibits
          **{n_basins} distinct attractor basin{'s' if n_basins!=1 else ''}**
          from {N_trials} random initialisations.
          {'The dominant basin captures ' + str(basin_sizes[0]) + '/' + str(N_trials) + ' trials, suggesting a strongly preferred global minimum.' if basin_sizes[0] > N_trials*0.6
           else 'Basins are roughly equally populated, indicating a nearly degenerate landscape.'}
          The Lorenz escape rate $k_{{\\rm esc}} = {k_esc:.4f}$ implies that
          {'the attractor is robust under chaotic perturbation (most trajectories return)' if k_esc < 0.25
           else 'the system is marginally stable — Lorenz kicks frequently dislodge trajectories' if k_esc < 0.5
           else 'the attractor is fragile; strong perturbation reliably escapes the basin'}.

          ---

          ## 5. Connection to NECF

          The CuriosityEngine in NECF deliberately injects Lorenz-phase kicks
          to prevent premature attractor lock-in.  With the measured
          $k_{{\\rm esc}} = {k_esc:.4f}$, a curiosity kick amplitude of 0.10
          escapes the field's current basin in approximately
          $1/k_{{\\rm esc}} = {1/k_esc if k_esc > 0 else 'inf':.1f}$ such interventions.
          This sets the minimum intervention budget for the CuriosityEngine's
          REFRAME directive.

          ---
          *{SESSION_ID} · generated {DATE_STR} · seed {seed}*
          """
              return doc.strip(), key, commit_suffix

          def topic_6_ablation(seed):
              """L1 / L2 / L3 ablation with t-test and Cohen's d."""
              N = 32;  T = 600;  N_TRIALS = 25
              results = {1:[], 2:[], 3:[]}
              for level in [1,2,3]:
                  for i in range(N_TRIALS):
                      res = run_ablated(level, N, T, seed + i*31 + level*1000)
                      results[level].append(res)

              stats = {}
              for level in [1,2,3]:
                  rs   = np.array([x["r"]    for x in results[level]])
                  vLs  = np.array([x["varL"] for x in results[level]])
                  Hs   = np.array([x["H"]    for x in results[level]])
                  stats[level] = {
                      "r_mean": rs.mean(), "r_std": rs.std(),
                      "r_ci_lo": float(np.percentile(rs, 2.5)),
                      "r_ci_hi": float(np.percentile(rs, 97.5)),
                      "varL_mean": vLs.mean(), "H_mean": Hs.mean(),
                      "n_rb": sum(x["n_rb"] for x in results[level]),
                  }

              r1 = np.array([x["r"] for x in results[1]])
              r3 = np.array([x["r"] for x in results[3]])
              t_stat, p_val = ttest_ind(r3, r1)
              pool_std = (r3.std()**2 + r1.std()**2) / 2
              pool_std = pool_std**0.5 if pool_std > 0 else 1e-9
              cohens_d = (r3.mean() - r1.mean()) / pool_std

              vL_ratio = (stats[3]["varL_mean"] /
                          max(stats[1]["varL_mean"], 1e-10))

              key = {
                  "stats": {str(k): {kk: float(vv) for kk,vv in v.items()}
                            for k,v in stats.items()},
                  "t_stat": float(t_stat), "p_val": float(p_val),
                  "cohens_d": float(cohens_d), "vL_ratio": float(vL_ratio),
              }
              commit_suffix = (f"L3_r={stats[3]['r_mean']:.4f} "
                               f"L1_r={stats[1]['r_mean']:.4f} "
                               f"p={p_val:.4f} d={cohens_d:.4f} "
                               f"varL_ratio={vL_ratio:.3f}x")

              def row(level):
                  s = stats[level]
                  return (f"| Level-{level} | {s['r_mean']:.5f} ± {s['r_std']:.5f} | "
                          f"[{s['r_ci_lo']:.4f}, {s['r_ci_hi']:.4f}] | "
                          f"{s['varL_mean']:.7f} | {s['H_mean']:.5f} | "
                          f"{s['n_rb']} |")

              sig_str = ("**significant** (p < 0.05)" if p_val < 0.05
                         else "**not significant** (p ≥ 0.05)")

              doc = rf"""
          ---
          session_id: {SESSION_ID}
          date: {DATE_STR}
          topic: Ablation Study L1-L2-L3
          seed: {seed}
          N: {N}
          N_trials: {N_TRIALS}
          ---

          # NECF Session Log — {DATE_STR}

          **Session ID:** `{SESSION_ID}`
          **Topic:** {TITLE}

          ---

          ## 1. Experimental Design

          Three conditions are compared under identical external driving
          ($N={N}$, $T={T}$, $K=0.55$, spike rate $= 0.05$, {N_TRIALS} independent
          trials per condition):

          | Condition | Rule Field $\\mathcal{{L}}$ | Description |
          |---|---|---|
          | **Level-1** | Frozen at initialisation | Baseline: no adaptation |
          | **Level-2** | Global $\\bar{{\\beta}}$ adapts | Prior art: adaptive coupling |
          | **Level-3** | Full NECF per-node $\\mathcal{{L}}_i$ evolves | This work |

          Primary metric: time-averaged order parameter $\\bar{{r}}$.
          Secondary metrics: rule-field variance $\\text{{Var}}(\\mathcal{{L}}_i)$,
          identity curvature $\\mathcal{{H}}$, rollback count.

          **Statistical test:** Welch's independent $t$-test, Level-3 vs Level-1.
          Effect size: Cohen's $d = (\\mu_3 - \\mu_1)/\\sigma_{{\\rm pooled}}$.

          ---

          ## 2. Results

          | Condition | $\\bar{{r}}$ (mean ± std) | 95% CI | $\\text{{Var}}(\\mathcal{{L}})$ | $\\mathcal{{H}}$ | Rollbacks |
          |---|---|---|---|---|---|
          {row(1)}
          {row(2)}
          {row(3)}

          ### 2.2 Inferential Statistics (Level-3 vs Level-1)

          | Statistic | Value |
          |---|---|
          | $t$-statistic | {t_stat:.4f} |
          | $p$-value (two-tailed) | {p_val:.5f} |
          | Cohen's $d$ | {cohens_d:.4f} |
          | $\\text{{Var}}(\\mathcal{{L}})$ ratio: Level-3 / Level-1 | **{vL_ratio:.4f}×** |
          | Significance | {sig_str} |

          ---

          ## 3. Interpretation

          The difference in order parameter between Level-3 (NECF) and Level-1
          (fixed rules) is {sig_str}.  Cohen's $d = {cohens_d:.4f}$ indicates a
          {'negligible' if abs(cohens_d)<0.2 else 'small' if abs(cohens_d)<0.5
           else 'medium' if abs(cohens_d)<0.8 else 'large'} effect size.

          The most discriminating observable at $T={T}$ is
          $\\text{{Var}}(\\mathcal{{L}}_i)$: the ratio Level-3 / Level-1 is
          **{vL_ratio:.4f}×**, confirming that the NECF meta-dynamics produce
          {'measurably different rule diversity from the frozen baseline' if abs(vL_ratio-1.0)>0.05
           else 'similar rule diversity to the frozen baseline at this timescale'}.
          The identity curvature $\\mathcal{{H}}$ in Level-3
          ($\\mathcal{{H}} = {stats[3]["H_mean"]:.5f}$) vs Level-1
          ($\\mathcal{{H}} = {stats[1]["H_mean"]:.5f}$) reflects this divergence.

          These results are consistent with the theoretical prediction: at
          $T={T}$, $\\mu=0.05$, the contagion rate is slow
          ($\\tau_{{\\rm mix}} \\approx {int(1/(0.05*0.25*0.01))}$ steps, from
          Topic-4 analysis), so $T={T}$ captures early-phase adaptation only.
          Differences in $r$ are expected to emerge beyond $T \\sim 2000$.

          ---
          *{SESSION_ID} · generated {DATE_STR} · seed {seed}*
          """
              return doc.strip(), key, commit_suffix

          # ── Dispatch ──────────────────────────────────────────────────────────
          dispatch = [
            topic_0_synchronization,
            topic_1_boltzmann,
            topic_2_identity_landscape,
            topic_3_lyapunov,
            topic_4_contagion,
            topic_5_topology,
            topic_6_ablation,
          ]
          doc_text, key_data, commit_suffix = dispatch[TOPIC_IDX](SEED)

          # ── Write docs/sessions/<date>_<slug>.md ──────────────────────────────
          os.makedirs("docs/sessions", exist_ok=True)
          fname = f"docs/sessions/{DATE_STR}_{SLUG}.md"
          with open(fname, "w") as f:
              f.write(doc_text + "\n")

          # ── Update docs/INDEX.md ──────────────────────────────────────────────
          index_path = "docs/INDEX.md"
          new_entry  = f"| [{DATE_STR}]({fname}) | {SESSION_ID} | {TITLE[:60]}... |"

          if os.path.exists(index_path):
              with open(index_path) as f:
                  existing = f.read()
          else:
              existing = textwrap.dedent(f"""\
              # NECF Research Session Index

              Automated daily research log.
              Each entry reports a real numerical experiment on the NECF architecture.
              Seven analysis types rotate by day-of-year modulo 7.

              | Date | Session ID | Topic |
              |---|---|---|
              """)

          # Avoid duplicate entries for the same date
          if DATE_STR not in existing:
              existing += new_entry + "\n"
              with open(index_path, "w") as f:
                  f.write(existing)

          # ── Write commit message ───────────────────────────────────────────────
          commit_msg = (
              f"necf({SESSION_ID}): {SLUG.replace('_',' ')} [{commit_suffix}]\n\n"
              f"Daily NECF research session {SESSION_ID}.\n"
              f"Topic {TOPIC_IDX}/6 · seed {SEED} · {DATE_STR}\n"
              f"Full data: {fname}"
          )
          with open("necf_commit_msg.txt", "w") as f:
              f.write(commit_msg)

          print(f"[NECF] {SESSION_ID} written → {fname}")
          print(f"[NECF] Commit: {commit_msg.splitlines()[0]}")

      # ── 4. Commit and push ────────────────────────────────────────────────────
      - name: Commit and push research log
        run: |
          git config user.name  "NECF-ResearchLog"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/

          # Only commit if there is something new
          if git diff --staged --quiet; then
            echo "[NECF] Nothing to commit — session already recorded for today."
            exit 0
          fi

          git commit -F necf_commit_msg.txt
          git push origin HEAD
